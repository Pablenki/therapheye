[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port    = 8888

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Scheduled notifications (daily at 20:00 UTC ≈ 2pm CST) ─────────────────
[functions."push-cron"]
  schedule = "0 20 * * *"
