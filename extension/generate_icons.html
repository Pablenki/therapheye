<!DOCTYPE html>
<!-- Abre este archivo en Chrome y descarga los 3 iconos -->
<html>
<body style="background:#0e1427;padding:20px;font-family:sans-serif;color:#e2e8f0">
<h2>Generador de iconos — Therapheye Screen Guard</h2>
<p style="color:#64748b;margin-bottom:20px">Haz clic en cada botón para descargar el ícono correspondiente y ponlo en la carpeta <code style="background:#1e2845;padding:2px 6px;border-radius:4px">extension/icons/</code></p>

<div style="display:flex;gap:16px;flex-wrap:wrap">
  <div>
    <canvas id="c16" width="16" height="16"></canvas>
    <br><button onclick="dl('c16','icon16.png')">Descargar icon16.png</button>
  </div>
  <div>
    <canvas id="c48" width="48" height="48"></canvas>
    <br><button onclick="dl('c48','icon48.png')">Descargar icon48.png</button>
  </div>
  <div>
    <canvas id="c128" width="128" height="128"></canvas>
    <br><button onclick="dl('c128','icon128.png')">Descargar icon128.png</button>
  </div>
</div>

<script>
function drawIcon(id, size) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const r = size * 0.45;
  const cx = size / 2, cy = size / 2;

  // Background
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, '#4f46e5');
  bg.addColorStop(1, '#7c3aed');
  ctx.fillStyle = bg;
  roundRect(ctx, 0, 0, size, size, size * 0.22);
  ctx.fill();

  // Eye white
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r * 0.62, 0, 0, Math.PI * 2);
  ctx.fill();

  // Iris
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.22, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.12, cy - r * 0.14, r * 0.09, 0, Math.PI * 2);
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function dl(id, name) {
  const a = document.createElement('a');
  a.href = document.getElementById(id).toDataURL('image/png');
  a.download = name;
  a.click();
}

drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
